<!doctype html>
<html>
  <head>
    <title>Registration Form Validation</title>

    <script>
      function validateForm() {
        // Get values
        var fname = document.getElementById("fname").value;
        var lname = document.getElementById("lname").value;
        var password = document.getElementById("password").value;
        var email = document.getElementById("email").value;
        var mobile = document.getElementById("mobile").value;
        var address = document.getElementById("address").value;

        // First Name
        var namePattern = /^[A-Za-z]+$/;
        if (!namePattern.test(fname) || fname.length < 6) {
          alert(
            "First Name should contain only alphabets and at least 6 characters.",
          );
          return false;
        }

        // Last Name
        if (lname == "") {
          alert("Last Name cannot be empty.");
          return false;
        }

        // Password
        if (password.length < 6) {
          alert("Password should be at least 6 characters.");
          return false;
        }

        // Email
        var emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;
        if (!emailPattern.test(email)) {
          alert("Enter a valid Email ID.");
          return false;
        }

        // Mobile Number
        var mobilePattern = /^[0-9]{10}$/;
        if (!mobilePattern.test(mobile)) {
          alert("Mobile Number should contain exactly 10 digits.");
          return false;
        }

        // Address
        if (address == "") {
          alert("Address cannot be empty.");
          return false;
        }

        alert("Registration Successful!");
        return true;
      }
    </script>
  </head>

  <body>
    <h2>Registration Form</h2>

    <form onsubmit="return validateForm();">
      First Name:
      <input type="text" id="fname" /><br /><br />

      Last Name:
      <input type="text" id="lname" /><br /><br />

      Password:
      <input type="password" id="password" /><br /><br />

      Email:
      <input type="text" id="email" /><br /><br />

      Mobile Number:
      <input type="text" id="mobile" /><br /><br />

      Address:
      <textarea id="address"></textarea><br /><br />

      <input type="submit" value="Register" />
    </form>
  </body>
</html>
